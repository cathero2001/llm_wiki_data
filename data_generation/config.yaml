# ============================================================
# llm_wiki 数据集配置文件
# ============================================================
# 使用前必读：
#   1. 只需要修改 anchor_date 为 demo 当天的日期
#   2. 运行 convert_dates.py 重算所有文件中的日期
#   3. 将 output/ 目录下的文件导入 llm_wiki
# ============================================================

# 【核心设置】demo 当天的日期（每次 demo 前改这里）
