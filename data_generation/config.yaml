  - id: "M3"
    name: "原型完成"
    day_offset: 14
    target_date: "2026-03-30"
    description: "MVP开发、首批功能上线内测"
  - id: "M4"
    name: "测试迭代"
    day_offset: 21
    target_date: "2026-04-06"
    description: "内测反馈收集、功能迭代"
  - id: "M5"
    name: "优化上线"
    day_offset: 28
    target_date: "2026-04-13"
    description: "功能和性能优化、准备发布"
  - id: "M6"
    name: "正式发布"
    day_offset: 42
    target_date: "2026-04-28"
    description: "WeBot上线运营、客户支持"

