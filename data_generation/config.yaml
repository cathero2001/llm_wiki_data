# ============================================================
# 日期映射表（自动计算，勿手动修改）
# ============================================================
# 计算公式：date_N = project_start + N 天
# 例如：date_0 = 2026-03-16, date_7 = 2026-03-23, ...
# anchor_date = 2026-04-28 时，date_42 = 2026-04-28

dates:
  date_0:   "2026-03-16"   # project_start
  date_7:   "2026-03-23"
  date_14:  "2026-03-30"
  date_21:  "2026-04-06"   # project_start + 21 天
  date_28:  "2026-04-13"   # project_start + 28 天
  date_35:  "2026-04-20"   # project_start + 35 天
  date_42:  "2026-04-28"   # anchor_date 当天

